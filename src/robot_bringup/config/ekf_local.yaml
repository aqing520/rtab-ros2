# Suggested location:
#   robot_bringup/config/ekf_local.yaml
#
# Design intent:
# - ekf_node publishes odom -> base_footprint.
# - wheel odom contributes smooth twist.
# - LiDAR odom contributes local pose + twist.
# - IMU contributes yaw / yaw-rate stabilization.
# - RTAB-Map remains the only global map -> odom source.

ekf_local_filter:
  ros__parameters:
    frequency: 50.0
    sensor_timeout: 0.10
    two_d_mode: true
    transform_time_offset: 0.0
    transform_timeout: 0.10
    print_diagnostics: true
    debug: false
    publish_tf: true
    publish_acceleration: false
    predict_to_current_time: true
    reset_on_time_jump: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    odom0: /sensors/wheel/odom
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  false, false,
                   false, false, true,
                   false, false, false]
    odom0_queue_size: 20
    odom0_nodelay: false
    odom0_differential: false
    odom0_relative: false

    odom1: /odometry/lio
    odom1_config: [true,  true,  false,
                   false, false, true,
                   true,  false, false,
                   false, false, true,
                   false, false, false]
    odom1_queue_size: 20
    odom1_nodelay: false
    odom1_differential: false
    odom1_relative: false

    imu0: /sensors/imu/data
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  false, false, false]
    imu0_queue_size: 50
    imu0_nodelay: false
    imu0_differential: false
    imu0_relative: true
    imu0_remove_gravitational_acceleration: true

    odom0_pose_rejection_threshold: 5.0
    odom0_twist_rejection_threshold: 2.0
    odom1_pose_rejection_threshold: 3.0
    odom1_twist_rejection_threshold: 2.0
    imu0_pose_rejection_threshold: 0.8
    imu0_twist_rejection_threshold: 0.8
